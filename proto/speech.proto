// speech.proto
syntax = "proto3";

package speech;

option go_package = "example.com/speechpb;speechpb";

// (float array) 
message AudioChunk {
  bytes audio_bytes = 1;
  // timestamp can be used to align the audio chunks and testing
}

message StreamingConfig {
  int32 chunk_duration_millis = 1;
}

message StreamingRecognizeRequest {
  oneof payload {
    StreamingConfig config = 1;
    AudioChunk audio_chunk = 2;
  }
}

message Transcript {
  int32 start_time_millis = 1;
  int32 end_time_millis = 2;
  string text = 3;
}

message StreamingRecognizeResponse {
  Transcript confirmed = 1;
  Transcript interim = 2;
}

// Bidirectional streaming with confirmed transcript updates and optional interim updates.
service SpeechToText {
  rpc StreamingRecognize(stream StreamingRecognizeRequest) returns (stream StreamingRecognizeResponse);
}
