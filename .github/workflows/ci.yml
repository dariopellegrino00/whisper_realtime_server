name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  requirements-sync:
    name: Requirements Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Check requirements alignment
        run: python scripts/deps.py check

  ruff:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check swim tools scripts tests

      - name: Run lint checks
        run: uv run ruff check swim tools scripts tests

  mypy:
    name: Mypy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --locked

      - name: Generate protobuf modules
        run: uv run python scripts/proto.py generate

      - name: Run mypy
        run: uv run mypy

  pytest:
    name: Pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --locked

      - name: Generate protobuf modules
        run: uv run python scripts/proto.py generate

      - name: Run tests
        run: uv run pytest -q

  release:
    name: Release (${{ github.ref_name }})
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [requirements-sync, ruff, mypy, pytest]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit reachable from origin/main."
            exit 1
          }

      - name: Create or update GitHub Release
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            const prerelease = tag.includes("-");
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
              prerelease,
            };

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              core.info(`Release for ${tag} already exists. Updating generated notes.`);
              await github.rest.repos.updateRelease({
                ...params,
                release_id: existing.data.id,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              core.info(`Creating release for ${tag}.`);
              await github.rest.repos.createRelease(params);
            }
